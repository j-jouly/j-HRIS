<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Employee | G-Pro Glow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            
            /* Glow Colors */
            --accent: #3ecf8e;
            --accent-glow: rgba(62, 207, 142, 0.4);
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.4);
            --danger: #ef4444; 
            --danger-glow: rgba(239, 68, 68, 0.4);
            --jeruk: #f97316;
            --jeruk-glow: rgba(249, 115, 22, 0.4);
            --ungu: #a855f7;
            --ungu-glow: rgba(168, 85, 247, 0.4);
            --indigo: #6366f1;
            --indigo-glow: rgba(99, 102, 241, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .master-layout { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            padding: 15px; 
            gap: 12px; 
        }

        /* --- TOOLBAR --- */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-dark);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .toolbar { display: flex; gap: 8px; align-items: center; }

        .btn-tool {
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .btn-new { background: var(--indigo); box-shadow: 0 0 10px var(--indigo-glow); }
        .btn-modify { background: transparent; border: 1px solid var(--blue); color: var(--blue); }
        .btn-delete { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-print { background: var(--ungu); box-shadow: 0 0 10px var(--ungu-glow); }
        .btn-save { background: var(--accent); color: #0f172a; box-shadow: 0 0 15px var(--accent-glow); }
        .btn-cancel { background: var(--jeruk); box-shadow: 0 0 10px var(--jeruk-glow); }
        .btn-home { background: var(--danger); box-shadow: 0 0 10px var(--danger-glow); margin-left: 10px; }

        .btn-tool:hover:not(:disabled) { 
            transform: translateY(-2px) scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 0 20px currentColor;
        }

        .btn-tool:active:not(:disabled) { transform: scale(0.95); }
        .btn-tool:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        /* --- SEARCH SECTION --- */
        .search-card {
            background: rgba(165, 180, 252, 0.1);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            border: 1px solid var(--indigo);
            box-shadow: 0 0 15px var(--indigo-glow);
            align-items: flex-end;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .input-group label { font-size: 10px; font-weight: 700; color: var(--indigo); text-transform: uppercase; letter-spacing: 1px; }
        .input-group input, .input-group select {
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 12px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--indigo); box-shadow: 0 0 10px var(--indigo-glow); }

        /* --- CONTENT GRID --- */
        .content-grid { 
            display: grid; 
            grid-template-columns: 0.9fr 1.1fr; 
            gap: 15px; 
            flex: 1; 
            overflow: hidden; 
        }

        .card { 
            background: var(--card-dark); 
            border-radius: 12px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* --- TABLE STYLING --- */
        .table-container { overflow-y: auto; flex: 1; background: var(--bg-dark); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { 
            background: #1e293b;
            color: var(--accent);
            padding: 12px; 
            text-align: left; 
            font-size: 11px; 
            font-weight: 700; 
            position: sticky; top: 0; z-index: 10;
            border-bottom: 2px solid var(--accent);
            text-transform: uppercase;
        }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-muted); }
        tr:hover td { background: rgba(62, 207, 142, 0.05); color: var(--accent); cursor: pointer; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge-active { background: rgba(62, 207, 142, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .badge-inactive { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        /* --- FORM ENTRY --- */
        .form-container { padding: 25px; overflow-y: auto; }
        .form-title { 
            font-size: 18px; font-weight: 700; margin-bottom: 20px; 
            display: flex; align-items: center; gap: 10px; color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }
        .form-title::before { content: ''; width: 4px; height: 20px; background: var(--accent); border-radius: 10px; box-shadow: 0 0 10px var(--accent); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .field-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; }
        .field-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .field-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); outline: none; background: #000; }
        .field-input:disabled { opacity: 0.4; cursor: not-allowed; background: #0f172a; }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <div class="master-layout">
        <div class="header-section">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="background: var(--accent); width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; color: #0f172a; font-weight: 900; font-size: 18px; box-shadow: 0 0 15px var(--accent-glow);">G</div>
                <span style="font-weight: 700; font-size: 18px; letter-spacing: 1px;">G-PRO <span style="font-weight: 300; color: var(--text-muted);">Master</span></span>
            </div>
            <div class="toolbar">
                <button id="btnNew" class="btn-tool btn-new" onclick="startNew()">🧔 New</button>
                <button id="btnModify" class="btn-tool btn-modify" disabled>📝 Modify</button>
                <button id="btnDelete" class="btn-tool btn-delete" disabled>⛔ Delete</button>                
                <button id="btnPrint" class="btn-tool btn-print" onclick="printData()" disabled>🖨️ Print</button>
                <div style="width: 2px; height: 25px; background: var(--border); margin: 0 5px;"></div>
                <button id="btnSave" class="btn-tool btn-save" onclick="saveData()" disabled>💾 Save</button>
                <button id="btnCancel" class="btn-tool btn-cancel" onclick="cancelAction()" disabled>♻️ Cancel</button>
                <div style="width: 2px; height: 25px; background: var(--border); margin: 0 5px;"></div>
                <button class="btn-tool btn-home" onclick="window.location.href='dashboard.html'">🏠 Home</button>
            </div>
        </div>

        <div class="search-card">
            <div class="input-group"><label>Code</label><input type="text" id="search_kode" placeholder="Search code..."></div>
            <div class="input-group"><label>Name</label><input type="text" id="search_nama" placeholder="Search name..."></div>
            <div class="input-group">
                <label>Status</label>
                <select id="search_status">
                    <option value="">All Status</option>
                    <option value="1">Active</option>
                    <option value="0">Inactive</option>
                </select>
            </div>
            <button class="btn-tool btn-new" style="height: 40px; padding: 0 25px;" onclick="fetchData()">🔎 Search</button>
        </div>

        <div class="content-grid">
            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>CODE</th>
                                <th>NAME</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="form-container">
                    <div class="form-title">Employee Information</div>
                    <form id="employeeForm">
                        <div class="form-grid">
                            <div>
                                <label class="field-label">Employee ID</label>
                                <input type="text" id="empl_nmbr" class="field-input" readonly placeholder="Auto-generated">
                            </div>
                            <div>
                                <label class="field-label">Current Status</label>
                                <select id="empl_stat" class="field-input" disabled>
                                    <option value="1">Active</option>
                                    <option value="0">Inactive</option>
                                </select>
                            </div>
                            <div class="full-width">
                                <label class="field-label">Full Name</label>
                                <input type="text" id="empl_name" class="field-input" disabled placeholder="Enter full name">
                            </div>
                            <div class="full-width">
                                <label class="field-label">Residential Address</label>
                                <textarea id="empl_addr" class="field-input" rows="2" style="resize: none;" disabled placeholder="Enter complete address"></textarea>
                            </div>
                            <div>
                                <label class="field-label">Username</label>
                                <input type="text" id="empl_unme" class="field-input" disabled placeholder="System login name">
                            </div>
                            <div>
                                <label class="field-label">Access Level</label>
                                <select id="empl_levl" class="field-input" disabled>
                                    <option value="0">Standard User</option>
                                    <option value="1">Administrator</option>
                                </select>
                            </div>
                            <div class="full-width">
                                <label class="field-label">Security Password</label>
                                <input type="password" id="empl_pswd" class="field-input" disabled placeholder="••••••••">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabaseUrl = 'https://bzrycuvpbsxvutqhxowp.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6cnljdXZwYnN4dnV0cWh4b3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTk5OTEsImV4cCI6MjA4NjkzNTk5MX0.MI2suZLflcMbc5AbPCRaT7_pT9qQISrsV5dKA63Si8s';
        const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

        let currentMode = 'VIEW';
        const inputIDs = ['empl_name', 'empl_addr', 'empl_unme', 'empl_pswd', 'empl_stat', 'empl_levl'];

        function setMode(mode) {
            currentMode = mode;
            const isEdit = (mode === 'NEW' || mode === 'EDIT');
            document.getElementById('btnNew').disabled = isEdit;
            document.getElementById('btnModify').disabled = isEdit || mode === 'EMPTY';
            document.getElementById('btnDelete').disabled = isEdit || mode === 'EMPTY';
            document.getElementById('btnPrint').disabled = isEdit || mode === 'EMPTY';
            document.getElementById('btnSave').disabled = !isEdit;
            document.getElementById('btnCancel').disabled = !isEdit;
            inputIDs.forEach(id => document.getElementById(id).disabled = !isEdit);
        }

        async function fetchData() {
            const tableBody = document.getElementById('employeeTableBody');
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 40px; color: var(--accent);">⌛ LOADING DATA...</td></tr>';
            try {
                let query = supabaseClient.from('TH_EMP01M').select('EMPL_NMBR, EMPL_NAME, EMPL_STAT');
                const s_kode = document.getElementById('search_kode').value;
                const s_nama = document.getElementById('search_nama').value;
                const s_stat = document.getElementById('search_status').value;
                if (s_kode) query = query.ilike('EMPL_NMBR', `%${s_kode}%`);
                if (s_nama) query = query.ilike('EMPL_NAME', `%${s_nama}%`);
                if (s_stat !== "") query = query.eq('EMPL_STAT', s_stat === "1");

                const { data, error } = await query.order('EMPL_NMBR', { ascending: true });
                if (error) throw error;
                tableBody.innerHTML = '';
                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 20px;">No record found.</td></tr>';
                }
                data.forEach(emp => {
                    const badge = emp.EMPL_STAT ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>';
                    tableBody.innerHTML += `<tr onclick="getDetail('${emp.EMPL_NMBR}')"><td>${emp.EMPL_NMBR}</td><td>${emp.EMPL_NAME}</td><td>${badge}</td></tr>`;
                });
            } catch (err) { console.error(err); }
        }

        async function getDetail(id) {
            try {
                const { data, error } = await supabaseClient.from('TH_EMP01M').select('*').eq('EMPL_NMBR', id).single();
                if (error) throw error;
                document.getElementById('empl_nmbr').value = data.EMPL_NMBR;
                document.getElementById('empl_name').value = data.EMPL_NAME;
                document.getElementById('empl_unme').value = data.EMPL_UNME;
                document.getElementById('empl_pswd').value = data.EMPL_PSWD;
                document.getElementById('empl_addr').value = data.EMPL_ADDR;
                document.getElementById('empl_stat').value = data.EMPL_STAT ? "1" : "0";
                document.getElementById('empl_levl').value = data.EMPL_LEVL ? "1" : "0";
                setMode('VIEW');
                document.getElementById('btnModify').onclick = () => setMode('EDIT');
                document.getElementById('btnDelete').onclick = () => doDelete(data.EMPL_NMBR);
            } catch (err) { alert(err.message); }
        }

        async function startNew() {
            document.getElementById('employeeForm').reset();
            setMode('NEW');
            const { count } = await supabaseClient.from('TH_EMP01M').select('*', { count: 'exact', head: true });
            document.getElementById('empl_nmbr').value = `GPro.${String((count || 0) + 1).padStart(3, '0')}`;
        }

        async function saveData() {
            const payload = {
                EMPL_NMBR: document.getElementById('empl_nmbr').value,
                EMPL_NAME: document.getElementById('empl_name').value,
                EMPL_UNME: document.getElementById('empl_unme').value,
                EMPL_PSWD: document.getElementById('empl_pswd').value,
                EMPL_ADDR: document.getElementById('empl_addr').value,
                EMPL_STAT: document.getElementById('empl_stat').value === "1",
                EMPL_LEVL: document.getElementById('empl_levl').value === "1"
            };
            try {
                let res = currentMode === 'NEW' ? await supabaseClient.from('TH_EMP01M').insert([payload]) : await supabaseClient.from('TH_EMP01M').update(payload).eq('EMPL_NMBR', payload.EMPL_NMBR);
                if (res.error) throw res.error;
                alert("SUCCESS: Data saved successfully!");
                fetchData();
                cancelAction();
            } catch (err) { alert("ERROR: " + err.message); }
        }

        async function doDelete(id) {
            if (confirm(`CAUTION: Are you sure you want to delete employee ${id}?`)) {
                const { error } = await supabaseClient.from('TH_EMP01M').delete().eq('EMPL_NMBR', id);
                if (!error) { fetchData(); cancelAction(); }
            }
        }

        function printData(){
           window.print();
        }
        
        function cancelAction() {
            setMode('EMPTY');
            document.getElementById('employeeForm').reset();
            document.getElementById('empl_nmbr').value = '';
        }

        window.onload = () => { fetchData(); setMode('EMPTY'); };
    </script>
</body>
</html>
