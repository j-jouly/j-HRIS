<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Karyawan Glow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- CSS GLOW IN THE DARK EDITION --- */
        :root {
            --primary-neon: #3ecf8e;
            --primary-glow: rgba(62, 207, 142, 0.4);
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .login-card {
            background: var(--card-dark);
            padding: 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(62, 207, 142, 0.05);
            position: relative;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-neon), transparent);
        }

        .logo-wrapper {
            width: 85px; height: 85px;
            margin: 0 auto 25px auto;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--primary-neon);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-wrapper img {
            width: 70%;
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-neon);
            text-shadow: 0 0 10px var(--primary-glow);
            margin-bottom: 5px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-neon);
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-neon);
            background: #0f172a;
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: var(--primary-neon);
            color: #0f172a;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .login-button:hover {
            background: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .signup-link {
            font-size: 0.85rem;
            margin-top: 20px;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--primary-neon);
            text-decoration: none;
            font-weight: 600;
        }

        .social-login {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            position: relative;
            padding-top: 20px;
        }

        .social-login p {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-dark);
            padding: 0 15px;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
        }

        .social-button {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .social-button img { width: 16px; height: 16px; }

        .social-button:hover {
            border-color: var(--primary-neon);
            background: rgba(62, 207, 142, 0.05);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        #messageBox {
            animation: fadeIn 0.3s ease;
            font-weight: 500;
            text-align: left;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrapper">
                <img src="DII.png" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=DII'">
            </div>
            
            <h1 class="login-title">Selamat Datang</h1>
            <p class="login-subtitle">Masuk ke akun Anda untuk melanjutkan</p>
    
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Username / Email</label>
                    <input type="text" id="email" placeholder="Masukkan username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <div id="messageBox" style="display: none; margin-bottom: 15px; font-size: 14px; padding: 12px; border-radius: 8px;"></div>

                <button type="submit" id="btnLogin" class="login-button">
                    <span class="btn-text">🔑 Masuk</span>
                </button>
            </form>

            <p class="signup-link">Belum punya akun? <a href="#">Daftar Sekarang</a></p>
            
            <div class="social-login">
                <p> - OR - </p>
                <div class="social-buttons">
                    <button type="button" class="social-button" onclick="handleSocialLogin('google')">
                        <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="G"> Google
                    </button>
                    <button type="button" class="social-button" onclick="handleSocialLogin('github')">
                        <img src="https://img.icons8.com/ios-glyphs/16/ffffff/github.png" alt="GH"> GitHub
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://bzrycuvpbsxvutqhxowp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6cnljdXZwYnN4dnV0cWh4b3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTk5OTEsImV4cCI6MjA4NjkzNTk5MX0.MI2suZLflcMbc5AbPCRaT7_pT9qQISrsV5dKA63Si8s';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. ELEMENTS ---
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const messageBox = document.getElementById('messageBox');

        // --- 3. HELPER FUNCTIONS (GLOW STYLE) ---
        function showMessage(msg, type = 'error') {
            messageBox.textContent = msg;
            messageBox.style.display = 'block';
            
            if (type === 'error') {
                messageBox.style.backgroundColor = 'rgba(239, 68, 68, 0.1)'; 
                messageBox.style.color = '#f87171'; 
                messageBox.style.border = '1px solid #f87171';
                messageBox.style.boxShadow = '0 0 10px rgba(248, 113, 113, 0.2)';
            } else {
                messageBox.style.backgroundColor = 'rgba(62, 207, 142, 0.1)'; 
                messageBox.style.color = '#3ecf8e'; 
                messageBox.style.border = '1px solid #3ecf8e';
                messageBox.style.boxShadow = '0 0 10px rgba(62, 207, 142, 0.2)';
            }
        }

        // --- 4. LOGIN LOGIC ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btnLogin.disabled = true;
            btnLogin.innerHTML = 'Memproses...';
            showMessage('Mengecek data...', 'success');

            const usernameInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;

            try {
                const { data, error } = await supabaseClient
                    .from('TH_EMP01M')
                    .select('EMPL_UNME, EMPL_PSWD')
                    .eq('EMPL_UNME', usernameInput)
                    .eq('EMPL_PSWD', passwordInput)
                    .single();

                if (error || !data) {
                    throw new Error('Username atau Password salah.');
                }

                showMessage('Login Berhasil! Mengalihkan...', 'success');
                
                localStorage.setItem('userSession', JSON.stringify({
                    username: data.EMPL_UNME,
                    loginTime: new Date().getTime()
                }));

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (err) {
                showMessage(err.message, 'error');
                btnLogin.disabled = false;
                btnLogin.innerHTML = '🔑 Masuk';
            }
        });

        // --- 5. SOCIAL LOGIN ---
        async function handleSocialLogin(provider) {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: window.location.origin }
            });
            if (error) showMessage('Gagal login dengan ' + provider, 'error');
        }
    </script>
</body>
</html>
